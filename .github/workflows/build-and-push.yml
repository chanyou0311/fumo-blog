name: Build and Push

on:
  push:
    branches: [main]
    # ArgoCD Image Updater の write-back (k8s/ 配下) で CI が再発火しないようにする
    paths-ignore:
      - 'k8s/**'

jobs:
  build:
    runs-on: arc-runner-fumo-blog
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Get short SHA
        id: sha
        run: echo "sha=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_OUTPUT

      - name: Login to Zot registry
        uses: docker/login-action@v3
        with:
          registry: registry.fumo.jp
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_PASSWORD }}

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64,linux/amd64
          push: true
          tags: registry.fumo.jp/fumo-blog:${{ steps.sha.outputs.sha }}
