server {
    listen 80;
    server_name _;
    server_tokens off;          # nginx バージョン情報の露出を防止
    root /usr/share/nginx/html;
    index index.html;

    # セキュリティヘッダー（nginx デフォルトでは未設定。公開サイトの最低限の防御として追加）
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # gzip 圧縮（nginx デフォルトでは無効。静的サイトの転送量削減のため有効化）
    gzip on;
    gzip_vary on;               # Vary: Accept-Encoding ヘッダー付与（CDN/Proxy キャッシュ対応）
    gzip_min_length 1000;
    gzip_types text/html text/css application/javascript application/json application/xml text/plain image/svg+xml;

    # 404 ハンドリング
    error_page 404 /404.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
